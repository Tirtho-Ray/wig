# GitHub Actions CI/CD workflow
#
# This workflow provides a two-part strategy:
#
# 1. Continuous Integration (CI):
#    - Triggers on pushes to ANY branch ('**') and on pull requests to 'main'.
#    - 'ci_pipeline': Installs dependencies (with caching), lints, and tests.
#    - 'build_docker': Verifies that the application's Docker image can be built successfully.
#
# 2. Continuous Deployment (CD):
#    - Triggers ONLY on a successful push to the 'main' branch.
#    - 'cd_pipeline': Depends on CI jobs. It builds the Docker image, pushes it to AWS ECR,
#      and deploys it to the EC2 instance.

name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ] # Run on pushes to all branches
  pull_request:
    branches: [ "main" ] # Run on pull requests targeting main

permissions:
  id-token: write # Required for AWS OIDC authentication
  contents: read  # Required to check out the repository

jobs:
  # ===============================================
  # CI Pipeline: Lint & Test
  # ===============================================
  ci_pipeline:
    name: CI - Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js with pnpm Caching
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm' # Enables caching for faster dependency installation

      - name: Install Dependencies
        run: pnpm install

      - name: Run Linter
        run: pnpm run lint

      - name: Run End-to-End Tests
        run: pnpm run test:e2e

  # ===============================================
  # CI Pipeline: Build Docker Image for Validation
  # ===============================================
  build_docker:
    name: CI - Validate Docker Build
    runs-on: ubuntu-latest
    needs: ci_pipeline
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: docker build -f Dockerfile .

  # ===============================================
  # CD Pipeline: Deploy to AWS
  # ===============================================
  cd_pipeline:
    name: CD - Deploy to AWS
    runs-on: ubuntu-latest
    needs: [ci_pipeline, build_docker] # Depends on both CI jobs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' # CRITICAL: Only run on push to main

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 Instance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/app
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker pull ${{ steps.build-image.outputs.image }}
            docker-compose -f docker-compose.pord.yml up -d --force-recreate
            docker image prune -af