version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: uillgus_db
    restart: always
    environment:
      POSTGRES_USER: uillgus
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: uillgus_db
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  
  redis_cache:
    image: redis:7-alpine
    container_name: redis_cache_uillgus
    restart: always
    ports:
      - "6375:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network


networks:
  app_network:
    driver: bridge


volumes:
  postgres_data:
  redis_data: